name: Check PR for Friend Link Application

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to process'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: friend-link-pr-${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  # ── 1. 初步筛查：仅处理修改 src/data/*.py 的 PR ─────────────────────────────
  triage:
    if: ${{ github.event_name == 'pull_request_target' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Initialize labels and validate changed files
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const owner = context.repo.owner
            const repo  = context.repo.repo
            const pull_number = context.payload.pull_request.number

            const LABELS = [
              '友链申请中',
              '文件结构符合', '文件结构不一致',
              'URL全部可达', '部分URL不可达', 'URL全部不可达',
              '验证网站所有权', '所有权已验证'
            ]

            async function ensureLabel(name) {
              try { await github.rest.issues.getLabel({ owner, repo, name }) }
              catch (e) {
                if (e.status === 404)
                  await github.rest.issues.createLabel({ owner, repo, name, color: 'ededed' })
                else throw e
              }
            }
            for (const l of LABELS) await ensureLabel(l)

            const files = []
            for await (const res of github.paginate.iterator(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number, per_page: 100 }
            )) for (const f of res.data) files.push(f.filename)

            const valid = files.length > 0
              && files.every(fn =>
                  /^src\/data\/[^/]+\.py$/.test(fn) && fn !== 'src/data/__init__.py')

            if (!valid) {
              core.info('非友链目录变更或包含不允许的文件，停止流程')
              return
            }

            await github.rest.issues.addLabels({
              owner, repo, issue_number: pull_number, labels: ['友链申请中']
            })
            core.info('添加标签: 友链申请中')

  # ── 2. 文件结构验证 ────────────────────────────────────────────────────────
  validate_structure:
    needs: triage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate data file structure
        uses: actions/github-script@v7
        id: structure
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const owner = context.repo.owner
            const repo  = context.repo.repo
            const pull_number = context.payload.pull_request.number
            const ref   = context.payload.pull_request.head.sha

            const dataFiles = []
            for await (const res of github.paginate.iterator(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number, per_page: 100 }
            )) for (const f of res.data)
              if (/^src\/data\/[^/]+\.py$/.test(f.filename) && f.filename !== 'src/data/__init__.py')
                dataFiles.push(f.filename)

            if (dataFiles.length === 0) return

            const { spawnSync } = require('child_process')
            const fs = require('fs')
            let allValid = true
            const errorBlocks = []

            for (const path of dataFiles) {
              const resp = await github.rest.repos.getContent({ owner, repo, path, ref })
              if (Array.isArray(resp.data) || !resp.data?.content) continue
              const content = Buffer.from(resp.data.content, 'base64').toString('utf8')
              const tmp = `/tmp/${path.replace(/\//g, '_')}`
              fs.writeFileSync(tmp, content)

              const r = spawnSync('python3', ['.github/scripts/validate_structure.py', tmp],
                { encoding: 'utf8', timeout: 30000 })
              if (r.status !== 0) {
                allValid = false
                const lines = (r.stdout + r.stderr).split('\n')
                  .filter(l => l.startsWith('ERROR:'))
                  .map(l => `- ${l.replace('ERROR: ', '')}`)
                  .join('\n')
                errorBlocks.push(`**\`${path}\`**:\n${lines}`)
              }
            }

            if (allValid) {
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number: pull_number, name: '文件结构不一致' }) } catch {}
              await github.rest.issues.addLabels({ owner, repo, issue_number: pull_number, labels: ['文件结构符合'] })
              core.setOutput('valid', 'true')
              core.info('文件结构验证通过')
            } else {
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number: pull_number, name: '文件结构符合' }) } catch {}
              await github.rest.issues.addLabels({ owner, repo, issue_number: pull_number, labels: ['文件结构不一致'] })
              core.setOutput('valid', 'false')
              const body = [
                '## ❌ 文件结构验证失败',
                '',
                '发现以下问题：',
                '',
                ...errorBlocks,
                '',
                '请确保 `.py` 文件包含名为 `DATA` 的字典，且含有 `name`、`description`、`uri` 非空字段。',
                '修改完成后在 PR 评论回复 `已修改` 以重新触发验证。'
              ].join('\n')
              await github.rest.issues.createComment({ owner, repo, issue_number: pull_number, body })
              core.info('文件结构验证失败，已评论')
            }

  # ── 3. 更新 PR 标题 ───────────────────────────────────────────────────────
  update_title:
    needs: validate_structure
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update PR title with site name
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const owner = context.repo.owner
            const repo  = context.repo.repo
            const pull_number = context.payload.pull_request.number
            const ref   = context.payload.pull_request.head.sha

            const dataFiles = []
            for await (const res of github.paginate.iterator(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number, per_page: 100 }
            )) for (const f of res.data)
              if (/^src\/data\/[^/]+\.py$/.test(f.filename) && f.filename !== 'src/data/__init__.py')
                dataFiles.push(f.filename)

            if (dataFiles.length === 0) return

            const { spawnSync } = require('child_process')
            const fs = require('fs')

            const path = dataFiles[0]
            const resp = await github.rest.repos.getContent({ owner, repo, path, ref })
            if (Array.isArray(resp.data) || !resp.data?.content) return
            const content = Buffer.from(resp.data.content, 'base64').toString('utf8')
            const tmp = `/tmp/${path.replace(/\//g, '_')}`
            fs.writeFileSync(tmp, content)

            const r = spawnSync('python3', ['.github/scripts/extract_field.py', tmp, 'name'],
              { encoding: 'utf8', timeout: 10000 })
            if (r.status !== 0) {
              core.warning(`提取 name 字段失败: ${r.stderr || r.stdout}`)
              return
            }
            const siteName = r.stdout.trim()
            if (!siteName) return

            const newTitle = `友链：${siteName}`
            const pr = await github.rest.pulls.get({ owner, repo, pull_number })
            if (pr.data.title !== newTitle) {
              await github.rest.pulls.update({ owner, repo, pull_number, title: newTitle })
              core.info(`PR 标题更新为: ${newTitle}`)
            }

  # ── 4. URL 可达性验证 ──────────────────────────────────────────────────────
  validate_urls:
    needs: update_title
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate URL reachability
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const owner = context.repo.owner
            const repo  = context.repo.repo
            const pull_number = context.payload.pull_request.number
            const ref   = context.payload.pull_request.head.sha

            const dataFiles = []
            for await (const res of github.paginate.iterator(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number, per_page: 100 }
            )) for (const f of res.data)
              if (/^src\/data\/[^/]+\.py$/.test(f.filename) && f.filename !== 'src/data/__init__.py')
                dataFiles.push(f.filename)

            if (dataFiles.length === 0) return

            const { spawnSync } = require('child_process')
            const fs = require('fs')

            async function checkUrl(url) {
              try {
                const ctrl = new AbortController()
                const id = setTimeout(() => ctrl.abort(), 10000)
                const r = await fetch(url, { method: 'HEAD', signal: ctrl.signal, redirect: 'follow' })
                clearTimeout(id)
                return r.ok || r.status < 400
              } catch { return false }
            }

            const unreachableUris = []
            const unreachableAvatars = []

            for (const path of dataFiles) {
              const resp = await github.rest.repos.getContent({ owner, repo, path, ref })
              if (Array.isArray(resp.data) || !resp.data?.content) continue
              const content = Buffer.from(resp.data.content, 'base64').toString('utf8')
              const tmp = `/tmp/${path.replace(/\//g, '_')}`
              fs.writeFileSync(tmp, content)

              for (const field of ['uri', 'avatar_uri']) {
                const r = spawnSync('python3', ['.github/scripts/extract_field.py', tmp, field],
                  { encoding: 'utf8', timeout: 10000 })
                if (r.status !== 0 || !r.stdout.trim()) continue
                const url = r.stdout.trim()
                const ok = await checkUrl(url)
                if (!ok) {
                  if (field === 'uri') unreachableUris.push({ path, url })
                  else unreachableAvatars.push({ path, url })
                }
              }
            }

            // 清理旧 URL 标签
            for (const lbl of ['URL全部可达', '部分URL不可达', 'URL全部不可达'])
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number: pull_number, name: lbl }) } catch {}

            if (unreachableUris.length === 0) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: pull_number, labels: ['URL全部可达'] })
              core.info('所有主 URI 均可达')
              if (unreachableAvatars.length > 0) {
                const lines = unreachableAvatars.map(x => `- \`${x.path}\`: ${x.url}`).join('\n')
                await github.rest.issues.createComment({
                  owner, repo, issue_number: pull_number,
                  body: `## ⚠️ 头像 URL 不可达（不影响合并）\n\n${lines}\n\n如需显示头像，请检查上述链接。`
                })
              }
            } else {
              const total = dataFiles.length
              const label = unreachableUris.length === total ? 'URL全部不可达' : '部分URL不可达'
              await github.rest.issues.addLabels({ owner, repo, issue_number: pull_number, labels: [label] })
              const lines = unreachableUris.map(x => `- \`${x.path}\`: ${x.url}`).join('\n')
              await github.rest.issues.createComment({
                owner, repo, issue_number: pull_number,
                body: [
                  '## ❌ 以下 URI 不可达',
                  '',
                  lines,
                  '',
                  '请确认链接可正常访问后，在 PR 评论回复 `准备完毕` 以重新验证。'
                ].join('\n')
              })
              core.setFailed('存在不可达的 URI')
            }

  # ── 5. 网站所有权验证 ─────────────────────────────────────────────────────
  verify_ownership:
    needs: validate_urls
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify site ownership
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const owner = context.repo.owner
            const repo  = context.repo.repo
            const pull_number = context.payload.pull_request.number
            const ref   = context.payload.pull_request.head.sha
            const commentBody = context.payload.comment?.body || ''

            const issue = await github.rest.issues.get({ owner, repo, issue_number: pull_number })
            const labels = new Set((issue.data.labels || []).map(l => l.name))
            if (labels.has('所有权已验证')) {
              core.info('所有权已验证，跳过')
              return
            }

            const { spawnSync } = require('child_process')
            const fs = require('fs')

            const dataFiles = []
            for await (const res of github.paginate.iterator(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number, per_page: 100 }
            )) for (const f of res.data)
              if (/^src\/data\/[^/]+\.py$/.test(f.filename) && f.filename !== 'src/data/__init__.py')
                dataFiles.push(f.filename)

            if (dataFiles.length === 0) return

            if (commentBody.includes('准备完毕')) {
              let verified = false
              for (const path of dataFiles) {
                const resp = await github.rest.repos.getContent({ owner, repo, path, ref })
                if (Array.isArray(resp.data) || !resp.data?.content) continue
                const content = Buffer.from(resp.data.content, 'base64').toString('utf8')
                const tmp = `/tmp/${path.replace(/\//g, '_')}`
                fs.writeFileSync(tmp, content)

                const uriR = spawnSync('python3', ['.github/scripts/extract_field.py', tmp, 'uri'],
                  { encoding: 'utf8', timeout: 10000 })
                if (uriR.status !== 0 || !uriR.stdout.trim()) continue
                const siteUrl = uriR.stdout.trim()

                try {
                  const ctrl = new AbortController()
                  const id = setTimeout(() => ctrl.abort(), 15000)
                  const r = await fetch(siteUrl, { signal: ctrl.signal })
                  clearTimeout(id)
                  const html = await r.text()
                  const repoUrl = `https://github.com/${owner}/${repo}`
                  if (html.includes(repoUrl) || html.includes(`${owner}.github.io`)) {
                    verified = true
                    break
                  }
                } catch (e) {
                  core.warning(`抓取 ${siteUrl} 失败: ${e.message}`)
                }
              }

              if (verified) {
                try { await github.rest.issues.removeLabel({ owner, repo, issue_number: pull_number, name: '验证网站所有权' }) } catch {}
                await github.rest.issues.addLabels({ owner, repo, issue_number: pull_number, labels: ['所有权已验证'] })
                await github.rest.issues.createComment({
                  owner, repo, issue_number: pull_number,
                  body: '## ✅ 网站所有权验证通过\n\n已在您的网站上发现仓库链接，将自动合并 PR。'
                })
                core.info('所有权验证通过')
              } else {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: pull_number,
                  body: [
                    '## ❌ 未能验证网站所有权',
                    '',
                    `请确保您的网站页面包含指向 \`https://github.com/${owner}/${repo}\` 的链接。`,
                    '',
                    '添加后再次回复 `准备完毕` 以重新验证。'
                  ].join('\n')
                })
                core.setFailed('所有权验证失败')
              }
            } else {
              await github.rest.issues.addLabels({ owner, repo, issue_number: pull_number, labels: ['验证网站所有权'] })
              await github.rest.issues.createComment({
                owner, repo, issue_number: pull_number,
                body: [
                  '## 🔍 需要验证网站所有权',
                  '',
                  '请在您网站的**友链页**或**关于页**添加我们仓库的链接：',
                  '',
                  '```',
                  `https://github.com/${owner}/${repo}`,
                  '```',
                  '',
                  '添加完成后，在 PR 评论回复 `准备完毕` 以触发验证。'
                ].join('\n')
              })
            }

  # ── 6. 自动合并 ───────────────────────────────────────────────────────────
  auto_merge:
    needs: verify_ownership
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Auto-merge PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const owner = context.repo.owner
            const repo  = context.repo.repo
            const pull_number = context.payload.pull_request.number
            const ref   = context.payload.pull_request.head.sha

            const issue = await github.rest.issues.get({ owner, repo, issue_number: pull_number })
            const labels = new Set((issue.data.labels || []).map(l => l.name))
            if (!labels.has('所有权已验证')) {
              core.info('所有权标签不存在，跳过合并')
              return
            }

            const { spawnSync } = require('child_process')
            const fs = require('fs')
            let siteName = '未知站点'

            try {
              const dataFiles = []
              for await (const res of github.paginate.iterator(
                github.rest.pulls.listFiles,
                { owner, repo, pull_number, per_page: 100 }
              )) for (const f of res.data)
                if (/^src\/data\/[^/]+\.py$/.test(f.filename) && f.filename !== 'src/data/__init__.py')
                  dataFiles.push(f.filename)

              if (dataFiles.length > 0) {
                const path = dataFiles[0]
                const resp = await github.rest.repos.getContent({ owner, repo, path, ref })
                if (!Array.isArray(resp.data) && resp.data?.content) {
                  const content = Buffer.from(resp.data.content, 'base64').toString('utf8')
                  const tmp = `/tmp/${path.replace(/\//g, '_')}`
                  fs.writeFileSync(tmp, content)
                  const r = spawnSync('python3', ['.github/scripts/extract_field.py', tmp, 'name'],
                    { encoding: 'utf8', timeout: 10000 })
                  if (r.status === 0 && r.stdout.trim()) siteName = r.stdout.trim()
                }
              }
            } catch (e) { core.warning(`提取站点名称失败: ${e.message}`) }

            try {
              await github.rest.pulls.merge({
                owner, repo, pull_number,
                merge_method: 'squash',
                commit_title: `友链申请: ${siteName}`
              })
              await github.rest.issues.createComment({
                owner, repo, issue_number: pull_number,
                body: `## 🎉 友链申请合并成功！\n\n恭喜！**${siteName}** 的友链申请已合并，稍后将在网站显示。感谢您的贡献！`
              })
              core.info('PR 合并成功')
            } catch (e) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: pull_number,
                body: `## ⚠️ 自动合并失败\n\n请联系仓库维护者手动处理。\n\n错误详情：\`${e.message}\``
              })
              core.setFailed(`合并失败: ${e.message}`)
            }

  # ── 7. 评论触发器：处理 "已修改" / "准备完毕" ─────────────────────────────
  handle_comments:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      github.event.comment.user.login == github.event.issue.user.login &&
      github.event.comment.user.type != 'Bot' &&
      (contains(github.event.comment.body, '已修改') ||
       contains(github.event.comment.body, '准备完毕')) &&
      !startsWith(github.event.comment.body, '>') &&
      !contains(github.event.comment.body, '已处理')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Process user comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const owner = context.repo.owner
            const repo  = context.repo.repo
            const issue_number = context.payload.issue.number
            const body  = context.payload.comment.body || ''

            core.info(`收到评论: ${body}`)

            const issue = await github.rest.issues.get({ owner, repo, issue_number })
            const labels = new Set((issue.data.labels || []).map(l => l.name))

            if (body.includes('已修改')) {
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name: '文件结构不一致' }) } catch {}
              if (!labels.has('文件结构符合'))
                await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['文件结构符合'] })
              await github.rest.issues.createComment({
                owner, repo, issue_number,
                body: '> ✅ 已处理"已修改"，将重新验证文件结构。'
              })
            }

            if (body.includes('准备完毕')) {
              for (const lbl of ['部分URL不可达', 'URL全部不可达'])
                try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name: lbl }) } catch {}
              if (!labels.has('URL全部可达'))
                await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['URL全部可达'] })
              for (const lbl of ['验证网站所有权', '所有权已验证'])
                try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name: lbl }) } catch {}
              await github.rest.issues.createComment({
                owner, repo, issue_number,
                body: '> ✅ 已处理"准备完毕"，将重新验证所有权。'
              })
            }

            try {
              await github.rest.actions.createWorkflowDispatch({
                owner, repo, workflow_id: 'pr-check.yml', ref: 'main',
                inputs: { pr_number: String(issue_number) }
              })
              core.info('已触发 workflow_dispatch 重新运行主流程')
            } catch (e) {
              core.warning(`触发主流程失败: ${e.message}`)
            }
