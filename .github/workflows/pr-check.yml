name: Check PR for Friend Link Application

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to process'
        required: false
        default: ''
      trigger_action:
        description: 'Action hint: re_validate | verify_ownership'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: friend-link-pr-${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  # ── 1. 初步筛查：仅处理修改 src/data/*.py 的 PR ─────────────────────────────
  triage:
    if: ${{ github.event_name == 'pull_request_target' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Initialize labels and validate changed files
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const owner = context.repo.owner
            const repo  = context.repo.repo
            const pull_number = context.payload.pull_request?.number
              || parseInt(context.payload.inputs?.pr_number)
            if (!pull_number) { core.info('无法确定 PR 编号，跳过'); return }

            const LABELS = [
              '友链申请中',
              '文件结构符合', '文件结构不一致',
              'URL全部可达', '部分URL不可达', 'URL全部不可达',
              '验证网站所有权', '所有权已验证'
            ]

            async function ensureLabel(name) {
              try { await github.rest.issues.getLabel({ owner, repo, name }) }
              catch (e) {
                if (e.status === 404)
                  await github.rest.issues.createLabel({ owner, repo, name, color: 'ededed' })
                else throw e
              }
            }
            for (const l of LABELS) await ensureLabel(l)

            // workflow_dispatch 时跳过文件变更校验
            if (context.eventName === 'workflow_dispatch') {
              core.info('workflow_dispatch 触发，跳过文件变更校验')
              return
            }

            // pull_request_target synchronize：清除可能过时的结构/URL 标签，强制重新验证
            if (context.payload.action === 'synchronize') {
              for (const lbl of ['文件结构符合', '文件结构不一致', 'URL全部可达', '部分URL不可达', 'URL全部不可达'])
                try { await github.rest.issues.removeLabel({ owner, repo, issue_number: pull_number, name: lbl }) } catch {}
              core.info('synchronize 事件：已清除结构与 URL 标签')
            }

            const files = []
            for await (const res of github.paginate.iterator(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number, per_page: 100 }
            )) for (const f of res.data) files.push(f.filename)

            const valid = files.length > 0
              && files.every(fn =>
                  /^src\/data\/[^/]+\.py$/.test(fn) && fn !== 'src/data/__init__.py')

            if (!valid) {
              core.info('非友链目录变更或包含不允许的文件，停止流程')
              return
            }

            await github.rest.issues.addLabels({
              owner, repo, issue_number: pull_number, labels: ['友链申请中']
            })
            core.info('添加标签: 友链申请中')

  # ── 2. 文件结构验证 ────────────────────────────────────────────────────────
  validate_structure:
    needs: triage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate data file structure
        uses: actions/github-script@v7
        id: structure
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const owner = context.repo.owner
            const repo  = context.repo.repo
            const pull_number = context.payload.pull_request?.number
              || parseInt(context.payload.inputs?.pr_number)
            if (!pull_number) { core.info('无法确定 PR 编号，跳过'); return }
            let ref = context.payload.pull_request?.head?.sha
            if (!ref) { const p = await github.rest.pulls.get({ owner, repo, pull_number }); ref = p.data.head.sha }

            // 标签跳过逻辑：文件结构已验证且不是 re_validate 触发时跳过
            const triggerAction = context.payload.inputs?.trigger_action || ''
            const curIssue0 = await github.rest.issues.get({ owner, repo, issue_number: pull_number })
            const curLabels0 = new Set((curIssue0.data.labels || []).map(l => l.name))
            if (curLabels0.has('文件结构符合') && triggerAction !== 're_validate') {
              core.info('文件结构已验证，跳过'); return
            }

            const dataFiles = []
            for await (const res of github.paginate.iterator(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number, per_page: 100 }
            )) for (const f of res.data)
              if (/^src\/data\/[^/]+\.py$/.test(f.filename) && f.filename !== 'src/data/__init__.py')
                dataFiles.push(f.filename)

            if (dataFiles.length === 0) return

            const { spawnSync } = require('child_process')
            const fs = require('fs')

            try {
            let allValid = true
            const errorBlocks = []

            for (const path of dataFiles) {
              const resp = await github.rest.repos.getContent({ owner, repo, path, ref })
              if (Array.isArray(resp.data) || !resp.data?.content) continue
              const content = Buffer.from(resp.data.content, 'base64').toString('utf8')
              const tmp = `/tmp/${path.replace(/\//g, '_')}`
              fs.writeFileSync(tmp, content)

              const r = spawnSync('python3', ['.github/scripts/validate_structure.py', tmp],
                { encoding: 'utf8', timeout: 30000 })
              if (r.status !== 0) {
                allValid = false
                const lines = (r.stdout + r.stderr).split('\n')
                  .filter(l => l.startsWith('ERROR:'))
                  .map(l => `- ${l.replace('ERROR: ', '')}`)
                  .join('\n')
                errorBlocks.push(`**\`${path}\`**:\n${lines}`)
              }
            }

            if (allValid) {
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number: pull_number, name: '文件结构不一致' }) } catch {}
              await github.rest.issues.addLabels({ owner, repo, issue_number: pull_number, labels: ['文件结构符合'] })
              core.setOutput('valid', 'true')
              core.info('文件结构验证通过')
            } else {
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number: pull_number, name: '文件结构符合' }) } catch {}
              await github.rest.issues.addLabels({ owner, repo, issue_number: pull_number, labels: ['文件结构不一致'] })
              core.setOutput('valid', 'false')
              const body = [
                '## ❌ 文件结构验证失败',
                '',
                '发现以下问题：',
                '',
                ...errorBlocks,
                '',
                '请确保 `.py` 文件包含名为 `DATA` 的字典，且含有 `name`、`description`、`uri` 非空字段。',
                '修改完成后在 PR 评论回复 `已修改` 以重新触发验证。'
              ].join('\n')
              await github.rest.issues.createComment({ owner, repo, issue_number: pull_number, body })
              core.info('文件结构验证失败，已评论')
            }
            } catch (e) {
              core.error(`文件结构验证发生未预期错误: ${e.message}`)
              throw e
            }

  # ── 3. 更新 PR 标题 ───────────────────────────────────────────────────────
  update_title:
    needs: validate_structure
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update PR title with site name
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const owner = context.repo.owner
            const repo  = context.repo.repo
            const pull_number = context.payload.pull_request?.number
              || parseInt(context.payload.inputs?.pr_number)
            if (!pull_number) { core.info('无法确定 PR 编号，跳过'); return }
            let ref = context.payload.pull_request?.head?.sha
            if (!ref) { const p = await github.rest.pulls.get({ owner, repo, pull_number }); ref = p.data.head.sha }

            const dataFiles = []
            for await (const res of github.paginate.iterator(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number, per_page: 100 }
            )) for (const f of res.data)
              if (/^src\/data\/[^/]+\.py$/.test(f.filename) && f.filename !== 'src/data/__init__.py')
                dataFiles.push(f.filename)

            if (dataFiles.length === 0) return

            const { spawnSync } = require('child_process')
            const fs = require('fs')

            try {
            const path = dataFiles[0]
            const resp = await github.rest.repos.getContent({ owner, repo, path, ref })
            if (Array.isArray(resp.data) || !resp.data?.content) return
            const content = Buffer.from(resp.data.content, 'base64').toString('utf8')
            const tmp = `/tmp/${path.replace(/\//g, '_')}`
            fs.writeFileSync(tmp, content)

            const r = spawnSync('python3', ['.github/scripts/extract_field.py', tmp, 'name'],
              { encoding: 'utf8', timeout: 10000 })
            if (r.status !== 0) {
              core.warning(`提取 name 字段失败: ${r.stderr || r.stdout}`)
              return
            }
            const siteName = r.stdout.trim()
            if (!siteName) return

            const newTitle = `友链：${siteName}`
            const pr = await github.rest.pulls.get({ owner, repo, pull_number })
            if (pr.data.title !== newTitle) {
              await github.rest.pulls.update({ owner, repo, pull_number, title: newTitle })
              core.info(`PR 标题更新为: ${newTitle}`)
            }
            } catch (e) {
              core.error(`更新 PR 标题发生未预期错误: ${e.message}`)
              throw e
            }

  # ── 4. URL 可达性验证 ──────────────────────────────────────────────────────
  validate_urls:
    needs: update_title
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate URL reachability
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const owner = context.repo.owner
            const repo  = context.repo.repo
            const pull_number = context.payload.pull_request?.number
              || parseInt(context.payload.inputs?.pr_number)
            if (!pull_number) { core.info('无法确定 PR 编号，跳过'); return }
            let ref = context.payload.pull_request?.head?.sha
            if (!ref) { const p = await github.rest.pulls.get({ owner, repo, pull_number }); ref = p.data.head.sha }

            // 标签跳过逻辑：verify_ownership 触发时直接跳过 URL 验证；其他 workflow_dispatch 且 URL 已全部可达时也跳过
            const triggerAction1 = context.payload.inputs?.trigger_action || ''
            if (triggerAction1 === 'verify_ownership') {
              core.info('verify_ownership 触发，跳过 URL 验证'); return
            }
            if (context.eventName === 'workflow_dispatch') {
              const curIssue1 = await github.rest.issues.get({ owner, repo, issue_number: pull_number })
              const curLabels1 = new Set((curIssue1.data.labels || []).map(l => l.name))
              if (curLabels1.has('URL全部可达')) {
                core.info('URL 已验证可达，跳过'); return
              }
            }

            const dataFiles = []
            for await (const res of github.paginate.iterator(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number, per_page: 100 }
            )) for (const f of res.data)
              if (/^src\/data\/[^/]+\.py$/.test(f.filename) && f.filename !== 'src/data/__init__.py')
                dataFiles.push(f.filename)

            if (dataFiles.length === 0) return

            const { spawnSync } = require('child_process')
            const fs = require('fs')

            try {
            // 用 curl 检测可达性：只要服务器有任意 HTTP 响应（含 403/404）即视为可达
            // curl 仅在连接失败/DNS 错误/超时时返回非零退出码
            function checkUrl(url) {
              const r = spawnSync('curl', [
                '-s', '-o', '/dev/null', '-L',
                '-A', 'Mozilla/5.0 (compatible; FriendLinkBot/1.0)',
                '--max-time', '15',
                '--retry', '2',
                '--retry-delay', '2',
                '-w', '%{http_code}',
                url
              ], { encoding: 'utf8', timeout: 60000 })
              const httpCode = parseInt(r.stdout.trim(), 10) || 0
              const ok = r.status === 0 && httpCode > 0
              core.info(`check_url [${url}]: curl_exit=${r.status} http=${httpCode} reachable=${ok}`)
              return ok
            }

            const unreachableUris = []
            const unreachableAvatars = []

            for (const path of dataFiles) {
              const resp = await github.rest.repos.getContent({ owner, repo, path, ref })
              if (Array.isArray(resp.data) || !resp.data?.content) continue
              const content = Buffer.from(resp.data.content, 'base64').toString('utf8')
              const tmp = `/tmp/${path.replace(/\//g, '_')}`
              fs.writeFileSync(tmp, content)

              for (const field of ['uri', 'avatar_uri']) {
                const r = spawnSync('python3', ['.github/scripts/extract_field.py', tmp, field],
                  { encoding: 'utf8', timeout: 10000 })
                if (r.status !== 0 || !r.stdout.trim()) continue
                const url = r.stdout.trim()
                const ok = checkUrl(url)
                if (!ok) {
                  if (field === 'uri') unreachableUris.push({ path, url })
                  else unreachableAvatars.push({ path, url })
                }
              }
            }

            // 清理旧 URL 标签
            for (const lbl of ['URL全部可达', '部分URL不可达', 'URL全部不可达'])
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number: pull_number, name: lbl }) } catch {}

            if (unreachableUris.length === 0) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: pull_number, labels: ['URL全部可达'] })
              core.info('所有主 URI 均可达')
              if (unreachableAvatars.length > 0) {
                const lines = unreachableAvatars.map(x => `- \`${x.path}\`: ${x.url}`).join('\n')
                await github.rest.issues.createComment({
                  owner, repo, issue_number: pull_number,
                  body: `## ⚠️ 头像 URL 不可达（不影响合并）\n\n${lines}\n\n如需显示头像，请检查上述链接。`
                })
              }
            } else {
              const total = dataFiles.length
              const label = unreachableUris.length === total ? 'URL全部不可达' : '部分URL不可达'
              await github.rest.issues.addLabels({ owner, repo, issue_number: pull_number, labels: [label] })
              const lines = unreachableUris.map(x => `- \`${x.path}\`: ${x.url}`).join('\n')
              await github.rest.issues.createComment({
                owner, repo, issue_number: pull_number,
                body: [
                  '## ❌ 以下 URI 不可达',
                  '',
                  lines,
                  '',
                  '请修复上述 URI 后推送新的提交，工作流将自动重新验证。'
                ].join('\n')
              })
              core.setFailed('存在不可达的 URI')
            }
            } catch (e) {
              core.error(`URL 可达性验证发生未预期错误: ${e.message}`)
              throw e
            }

  # ── 5. 网站所有权验证 ─────────────────────────────────────────────────────
  verify_ownership:
    needs: validate_urls
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify site ownership
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const owner = context.repo.owner
            const repo  = context.repo.repo
            const pull_number = context.payload.pull_request?.number
              || parseInt(context.payload.inputs?.pr_number)
            if (!pull_number) { core.info('无法确定 PR 编号，跳过'); return }
            let ref = context.payload.pull_request?.head?.sha
            if (!ref) { const p = await github.rest.pulls.get({ owner, repo, pull_number }); ref = p.data.head.sha }

            // trigger_action === 'verify_ownership' 时执行实际验证，否则仅发送说明
            const triggerAction = context.payload.inputs?.trigger_action || ''
            const shouldVerify = triggerAction === 'verify_ownership'

            try {
            const issue = await github.rest.issues.get({ owner, repo, issue_number: pull_number })
            const labels = new Set((issue.data.labels || []).map(l => l.name))
            // shouldVerify=true 时强制执行验证，忽略标签跳过
            if (!shouldVerify && labels.has('所有权已验证')) {
              core.info('所有权已验证，跳过')
              return
            }

            const { spawnSync } = require('child_process')
            const fs = require('fs')

            const dataFiles = []
            for await (const res of github.paginate.iterator(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number, per_page: 100 }
            )) for (const f of res.data)
              if (/^src\/data\/[^/]+\.py$/.test(f.filename) && f.filename !== 'src/data/__init__.py')
                dataFiles.push(f.filename)

            if (dataFiles.length === 0) return

            // 所有权验证目标链接
            const OWNERSHIP_LINKS = ['https://waterspo.top']

            // 从数据文件中提取 fallback_uri
            async function getFallbackUri(path) {
              const resp = await github.rest.repos.getContent({ owner, repo, path, ref })
              if (Array.isArray(resp.data) || !resp.data?.content) return null
              const content = Buffer.from(resp.data.content, 'base64').toString('utf8')
              const tmp = `/tmp/${path.replace(/\//g, '_')}`
              fs.writeFileSync(tmp, content)
              const r = spawnSync('python3', ['.github/scripts/extract_field.py', tmp, 'fallback_uri'],
                { encoding: 'utf8', timeout: 10000 })
              return (r.status === 0 && r.stdout.trim()) ? r.stdout.trim() : null
            }

            // 用 curl 抓取页面内容并检查是否含有指定链接
            function fetchAndCheck(url) {
              const r = spawnSync('curl', [
                '-sL',
                '-A', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
                '-H', 'Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8',
                '-H', 'Accept-Language: zh-CN,zh;q=0.9,en;q=0.8',
                '-H', 'Accept-Encoding: gzip, deflate, br',
                '-H', 'Cache-Control: no-cache',
                '--compressed',
                '--max-time', '15',
                '--retry', '2',
                '-w', '\n__STATUS__%{http_code}',
                url
              ], { encoding: 'utf8', timeout: 60000 })
              if (r.status !== 0) {
                core.warning(`curl 抓取 ${url} 失败，exit=${r.status}`)
                return { ok: false, html: '', httpCode: 0 }
              }
              const out = r.stdout
              const marker = '\n__STATUS__'
              const idx = out.lastIndexOf(marker)
              const html = idx >= 0 ? out.slice(0, idx) : out
              const httpCode = idx >= 0 ? parseInt(out.slice(idx + marker.length), 10) || 0 : 0
              return { ok: true, html, httpCode }
            }

            if (shouldVerify) {
              let verified = false
              let failReason = ''

              for (const path of dataFiles) {
                const fallbackUri = await getFallbackUri(path)
                if (!fallbackUri) {
                  failReason = `\`${path}\` 中缺少 \`fallback_uri\` 字段或提取失败。`
                  continue
                }

                core.info(`检查 fallback_uri: ${fallbackUri}`)
                const { ok, html } = fetchAndCheck(fallbackUri)
                core.info(`[源码] ${fallbackUri}\n${html}`)
                if (!ok) {
                  failReason = `无法访问 \`fallback_uri\`：${fallbackUri}`
                  continue
                }

                const found = OWNERSHIP_LINKS.find(link => html.includes(link))
                if (found) {
                  core.info(`在 ${fallbackUri} 中找到链接: ${found}`)
                  verified = true
                  break
                } else {
                  failReason = `在 ${fallbackUri} 的页面内容中未找到以下任意链接：\n${OWNERSHIP_LINKS.map(l => `- \`${l}\``).join('\n')}`
                }
              }

              if (verified) {
                try { await github.rest.issues.removeLabel({ owner, repo, issue_number: pull_number, name: '验证网站所有权' }) } catch {}
                await github.rest.issues.addLabels({ owner, repo, issue_number: pull_number, labels: ['所有权已验证'] })
                await github.rest.issues.createComment({
                  owner, repo, issue_number: pull_number,
                  body: '## ✅ 网站所有权验证通过\n\n已在您的 `fallback_uri` 页面中发现指定链接，将自动合并 PR。'
                })
                core.info('所有权验证通过')
              } else {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: pull_number,
                  body: [
                    '## ❌ 未能验证网站所有权',
                    '',
                    failReason,
                    '',
                    '请确认后再次回复 `准备完毕` 以重新验证。'
                  ].join('\n')
                })
                core.setFailed('所有权验证失败')
              }
            } else {
              await github.rest.issues.addLabels({ owner, repo, issue_number: pull_number, labels: ['验证网站所有权'] })

              // 若存在 fallback_uri，检查当前页面是否已含有指定链接
              let currentStatus = ''
              for (const path of dataFiles) {
                const fallbackUri = await getFallbackUri(path)
                if (fallbackUri) {
                  core.info(`检查当前状态 fallback_uri: ${fallbackUri}`)
                  const { ok, html, httpCode } = fetchAndCheck(fallbackUri)
                  core.info(`[源码] ${fallbackUri}\n${html}`)
                  if (!ok) {
                    currentStatus = `> **当前检测状态**：⚠️ 无法访问 \`${fallbackUri}\`，请确认页面可正常访问。`
                  } else {
                    const found = OWNERSHIP_LINKS.find(link => html.includes(link))
                    const codeStr = httpCode ? ` (HTTP ${httpCode})` : ''
                    currentStatus = found
                      ? `> **当前检测状态**：✅ 已在 \`${fallbackUri}\` 检测到链接 \`${found}\`${codeStr}，可直接回复 \`准备完毕\` 触发验证。`
                      : `> **当前检测状态**：❌ 已检测 \`${fallbackUri}\`${codeStr}，页面中尚未发现指定链接，请添加后回复 \`准备完毕\`。`
                  }
                  break
                }
              }

              const bodyLines = [
                '## 🔍 需要验证网站所有权',
                '',
                '请在您 `DATA` 中 `fallback_uri` 所指向的页面（如友链页、关于页）中添加以下**任意一个**链接：',
                '',
                '| 可选链接 |',
                '|---|',
                '| `https://waterspo.top` |',
                '',
                '> 若您的 `DATA` 中尚未包含 `fallback_uri` 字段，请先在数据文件中添加该字段，值为包含上述链接的页面地址。',
              ]
              if (currentStatus) { bodyLines.push(''); bodyLines.push(currentStatus) }
              bodyLines.push('')
              bodyLines.push('完成后在 PR 评论回复 `准备完毕` 以触发验证。')

              await github.rest.issues.createComment({
                owner, repo, issue_number: pull_number,
                body: bodyLines.join('\n')
              })
            }
            } catch (e) {
              core.error(`所有权验证发生未预期错误: ${e.message}`)
              throw e
            }

  # ── 6. 自动合并 ───────────────────────────────────────────────────────────
  auto_merge:
    needs: verify_ownership
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Auto-merge PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const owner = context.repo.owner
            const repo  = context.repo.repo
            const pull_number = context.payload.pull_request?.number
              || parseInt(context.payload.inputs?.pr_number)
            if (!pull_number) { core.info('无法确定 PR 编号，跳过'); return }
            let ref = context.payload.pull_request?.head?.sha
            if (!ref) { const p = await github.rest.pulls.get({ owner, repo, pull_number }); ref = p.data.head.sha }

            const issue = await github.rest.issues.get({ owner, repo, issue_number: pull_number })
            const labels = new Set((issue.data.labels || []).map(l => l.name))
            if (!labels.has('所有权已验证')) {
              core.info('所有权标签不存在，跳过合并')
              return
            }

            const { spawnSync } = require('child_process')
            const fs = require('fs')
            let siteName = '未知站点'

            try {
              const dataFiles = []
              for await (const res of github.paginate.iterator(
                github.rest.pulls.listFiles,
                { owner, repo, pull_number, per_page: 100 }
              )) for (const f of res.data)
                if (/^src\/data\/[^/]+\.py$/.test(f.filename) && f.filename !== 'src/data/__init__.py')
                  dataFiles.push(f.filename)

              if (dataFiles.length > 0) {
                const path = dataFiles[0]
                const resp = await github.rest.repos.getContent({ owner, repo, path, ref })
                if (!Array.isArray(resp.data) && resp.data?.content) {
                  const content = Buffer.from(resp.data.content, 'base64').toString('utf8')
                  const tmp = `/tmp/${path.replace(/\//g, '_')}`
                  fs.writeFileSync(tmp, content)
                  const r = spawnSync('python3', ['.github/scripts/extract_field.py', tmp, 'name'],
                    { encoding: 'utf8', timeout: 10000 })
                  if (r.status === 0 && r.stdout.trim()) siteName = r.stdout.trim()
                }
              }
            } catch (e) { core.warning(`提取站点名称失败: ${e.message}`) }

            try {
              await github.rest.pulls.merge({
                owner, repo, pull_number,
                merge_method: 'squash',
                commit_title: `友链申请: ${siteName}`
              })
              await github.rest.issues.createComment({
                owner, repo, issue_number: pull_number,
                body: `## 🎉 友链申请合并成功！\n\n恭喜！**${siteName}** 的友链申请已合并，稍后将在网站显示。感谢您的贡献！`
              })
              core.info('PR 合并成功')
            } catch (e) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: pull_number,
                body: `## ⚠️ 自动合并失败\n\n请联系仓库维护者手动处理。\n\n错误详情：\`${e.message}\``
              })
              core.setFailed(`合并失败: ${e.message}`)
            }

  # ── 7. 评论触发器：处理 "已修改" / "准备完毕" ─────────────────────────────
  handle_comments:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      github.event.comment.user.login == github.event.issue.user.login &&
      github.event.comment.user.type != 'Bot' &&
      (contains(github.event.comment.body, '已修改') ||
       contains(github.event.comment.body, '准备完毕')) &&
      !startsWith(github.event.comment.body, '>') &&
      !contains(github.event.comment.body, '已处理')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Process user comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const owner = context.repo.owner
            const repo  = context.repo.repo
            const issue_number = context.payload.issue.number
            const body  = context.payload.comment.body || ''

            core.info(`收到评论: ${body}`)

            const issue = await github.rest.issues.get({ owner, repo, issue_number })
            const labels = new Set((issue.data.labels || []).map(l => l.name))

            if (body.includes('已修改')) {
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name: '文件结构不一致' }) } catch {}
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name: '文件结构符合' }) } catch {}
              await github.rest.issues.createComment({
                owner, repo, issue_number,
                body: '> ✅ 已处理"已修改"，将重新验证文件结构。'
              })
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner, repo, workflow_id: 'pr-check.yml', ref: 'main',
                  inputs: { pr_number: String(issue_number), trigger_action: 're_validate' }
                })
                core.info('已触发 re_validate dispatch')
              } catch (e) { core.warning(`触发主流程失败: ${e.message}`) }
            }

            if (body.includes('准备完毕')) {
              for (const lbl of ['验证网站所有权', '所有权已验证'])
                try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name: lbl }) } catch {}
              await github.rest.issues.createComment({
                owner, repo, issue_number,
                body: '> ✅ 已处理"准备完毕"，将重新验证所有权。'
              })
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner, repo, workflow_id: 'pr-check.yml', ref: 'main',
                  inputs: { pr_number: String(issue_number), trigger_action: 'verify_ownership' }
                })
                core.info('已触发 verify_ownership dispatch')
              } catch (e) { core.warning(`触发主流程失败: ${e.message}`) }
            }
