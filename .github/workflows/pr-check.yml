name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  validate-and-process:
    # 触发条件：PR创建/更新 或 PR评论包含关键词
    if: >
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       (contains(github.event.comment.body, '已修改') ||
        contains(github.event.comment.body, '准备完毕')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pull-requests: write
      contents: write
    
    steps:
      # ---------------------------------------------------------------
      # 环境初始化阶段
      # ---------------------------------------------------------------
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: |
          pip install requests

      # ---------------------------------------------------------------
      # 阶段0：解析PR编号
      # ---------------------------------------------------------------
      - name: 获取PR编号
        id: pr-info
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          else
            PR_NUMBER="${{ github.event.issue.number }}"
          fi
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "解析到PR编号: ${PR_NUMBER}"

      # ---------------------------------------------------------------
      # 阶段1：文件变更检查
      # ---------------------------------------------------------------
      - name: 检查文件变更
        id: file-change-check
        timeout-minutes: 3
        env:
          PAT: ${{ secrets.PAT }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBER="${{ steps.pr-info.outputs.pr_number }}"
          
          # 使用GitHub API获取变更文件列表
          CHANGED_FILES=$(curl -sf \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/files" \
            | jq -r '.[].filename')
          
          echo "=== 变更的文件 ==="
          echo "$CHANGED_FILES"
          echo "=================="
          
          # 验证变更是否符合要求
          VALID_CHANGE="true"
          INVALID_FILES_FOUND="false"
          
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            
            # 检查是否为src/data/目录下的.py文件，且不是__init__.py
            if [[ ! "$file" =~ ^src/data/[^/]+\.py$ ]] || \
               [[ "$file" == "src/data/__init__.py" ]]; then
              VALID_CHANGE="false"
              INVALID_FILES_FOUND="true"
              echo "❌ 发现无效文件: ${file}"
            else
              echo "✅ 有效文件: ${file}"
            fi
          done <<< "$CHANGED_FILES"
          
          echo "valid_change=${VALID_CHANGE}" >> "$GITHUB_OUTPUT"
          echo "invalid_files_found=${INVALID_FILES_FOUND}" >> "$GITHUB_OUTPUT"
          {
            echo "changed_files<<__FILELIST__"
            echo "$CHANGED_FILES"
            echo "__FILELIST__"
          } >> "$GITHUB_OUTPUT"
          
          if [[ "$VALID_CHANGE" == "true" ]]; then
            echo "✓ 所有变更文件均符合要求"
          else
            echo "! 检测到不符合要求的文件变更"
          fi

      # 如果文件变更不符合要求，直接退出工作流程
      - name: 终止无效变更的工作流程
        if: steps.file-change-check.outputs.invalid_files_found == 'true'
        run: |
          echo "::notice::检测到无效文件变更，工作流程终止"
          exit 0

      # 为符合条件的PR添加初始标签
      - name: 添加初始标签
        if: steps.file-change-check.outputs.valid_change == 'true'
        timeout-minutes: 2
        env:
          PAT: ${{ secrets.PAT }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBER="${{ steps.pr-info.outputs.pr_number }}"
          
          # 添加"友链申请中"标签
          curl -sf -X POST \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/labels" \
            -d '{"labels":["友链申请中"]}' > /dev/null || true
          
          echo "✓ 已添加'友链申请中'标签"

      # ---------------------------------------------------------------
      # 阶段2：文件结构验证
      # ---------------------------------------------------------------
      - name: 验证文件结构
        id: structure-validation
        if: steps.file-change-check.outputs.valid_change == 'true'
        timeout-minutes: 3
        env:
          PAT: ${{ secrets.PAT }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBER="${{ steps.pr-info.outputs.pr_number }}"
          CHANGED_FILES="${{ steps.file-change-check.outputs.changed_files }}"
          COMMENT_TRIGGER="${{ github.event.comment.body }}"
          
          # 标签和评论辅助函数
          add_label() {
            curl -sf -X POST \
              -H "Authorization: Bearer $PAT" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/labels" \
              -d "$(jq -n --arg l "$1" '{"labels":[$l]}')" > /dev/null || true
          }
          
          remove_label() {
            local encoded
            encoded=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1],safe=''))" "$1")
            curl -sf -X DELETE \
              -H "Authorization: Bearer $PAT" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/labels/$encoded" > /dev/null || true
          }
          
          post_comment() {
            local body_json
            body_json=$(jq -n --arg b "$1" '{"body":$b}')
            curl -sf -X POST \
              -H "Authorization: Bearer $PAT" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
              -d "$body_json" > /dev/null || true
          }
          
          # 判断是否由"已修改"关键词触发重新验证
          TRIGGERED_BY_MODIFY=false
          if [[ "$COMMENT_TRIGGER" == *"已修改"* ]]; then
            TRIGGERED_BY_MODIFY=true
            echo "🔄 由'已修改'关键词触发重新验证"
          fi
          
          VALID_STRUCTURE="true"
          ERROR_BLOCK=""
          
          # 验证每个变更的文件
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            echo "--- 验证文件: ${file} ---"
            
            OUTPUT=$(python3 .github/scripts/validate_structure.py "$file" 2>&1)
            EXIT_CODE=$?
            echo "$OUTPUT"
            
            if [[ $EXIT_CODE -ne 0 ]]; then
              VALID_STRUCTURE="false"
              ERRORS=$(echo "$OUTPUT" | grep "^ERROR:" | sed 's/^ERROR: /- /')
              ERROR_BLOCK+="**\`${file}\`**:\n${ERRORS}\n\n"
            fi
          done <<< "$CHANGED_FILES"
          
          echo "valid_structure=${VALID_STRUCTURE}" >> "$GITHUB_OUTPUT"
          {
            echo "error_messages<<__ERRMSG__"
            printf '%b' "$ERROR_BLOCK"
            echo ""
            echo "__ERRMSG__"
          } >> "$GITHUB_OUTPUT"
          
          # 处理验证结果
          if [[ "$VALID_STRUCTURE" == "true" ]]; then
            add_label "文件结构符合"
            remove_label "文件结构不一致"
            echo "✓ 所有文件通过结构验证"
          else
            add_label "文件结构不一致"
            remove_label "文件结构符合"
            
            # 只有在首次失败或由"已修改"触发时才发送评论
            if [[ "$TRIGGERED_BY_MODIFY" == "true" ]] || [[ "$COMMENT_TRIGGER" != *"已修改"* ]]; then
              COMMENT=$(printf '## ❌ 文件结构验证失败\n\n发现以下问题：\n\n%b请按照指定模板修改文件结构，确保：\n1. 文件为 `.py` 后缀\n2. 包含名为 `DATA` 的字典对象\n3. `DATA` 字典包含必填字段：`name`、`description`、`uri`\n4. 所有字段值为非空字符串\n5. 若存在 `avatar_uri` 字段，其值必须为非空字符串\n\n修改完成后，请在 PR 评论区回复 `已修改` 以重新触发验证。' "$ERROR_BLOCK")
              post_comment "$COMMENT"
            fi
            echo "! 文件结构验证失败"
          fi

      # ---------------------------------------------------------------
      # 阶段3：PR标题更新
      # ---------------------------------------------------------------
      - name: 更新PR标题
        id: update-title
        if: >
          steps.file-change-check.outputs.valid_change == 'true' &&
          steps.structure-validation.outputs.valid_structure == 'true'
        timeout-minutes: 2
        env:
          PAT: ${{ secrets.PAT }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBER="${{ steps.pr-info.outputs.pr_number }}"
          CHANGED_FILES="${{ steps.file-change-check.outputs.changed_files }}"
          
          # 获取第一个有效的Python文件
          FIRST_FILE=$(echo "$CHANGED_FILES" | grep -E '\.py$' | head -1)
          
          # 提取网站名称
          SITE_NAME=$(python3 .github/scripts/extract_field.py "$FIRST_FILE" name 2>/dev/null || echo "")
          
          if [[ -z "$SITE_NAME" ]]; then
            echo "::warning::无法提取网站名称，跳过标题更新"
            echo "site_name=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          NEW_TITLE="友链：${SITE_NAME}"
          
          # 获取当前标题
          CURRENT_TITLE=$(curl -sf \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER" | jq -r '.title')
          
          # 只有当标题不同时才更新（幂等性）
          if [[ "$CURRENT_TITLE" != "$NEW_TITLE" ]]; then
            TITLE_JSON=$(jq -n --arg t "$NEW_TITLE" '{"title":$t}')
            curl -sf -X PATCH \
              -H "Authorization: Bearer $PAT" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER" \
              -d "$TITLE_JSON" > /dev/null
            echo "✓ PR标题已更新为: ${NEW_TITLE}"
          else
            echo "✓ PR标题已经是正确格式，无需更新"
          fi
          
          echo "site_name=${SITE_NAME}" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------
      # 阶段4：URL可达性验证
      # ---------------------------------------------------------------
      - name: 验证URL可达性
        id: url-validation
        if: >
          steps.file-change-check.outputs.valid_change == 'true' &&
          steps.structure-validation.outputs.valid_structure == 'true'
        timeout-minutes: 5
        env:
          PAT: ${{ secrets.PAT }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBER="${{ steps.pr-info.outputs.pr_number }}"
          CHANGED_FILES="${{ steps.file-change-check.outputs.changed_files }}"
          COMMENT_TRIGGER="${{ github.event.comment.body }}"
          
          # 辅助函数
          add_label() {
            curl -sf -X POST \
              -H "Authorization: Bearer $PAT" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/labels" \
              -d "$(jq -n --arg l "$1" '{"labels":[$l]}')" > /dev/null || true
          }
          
          remove_label() {
            local encoded
            encoded=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1],safe=''))" "$1")
            curl -sf -X DELETE \
              -H "Authorization: Bearer $PAT" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/labels/$encoded" > /dev/null || true
          }
          
          post_comment() {
            local body_json
            body_json=$(jq -n --arg b "$1" '{"body":$b}')
            curl -sf -X POST \
              -H "Authorization: Bearer $PAT" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
              -d "$body_json" > /dev/null || true
          }
          
          # 判断是否由"准备完毕"关键词触发重新验证
          TRIGGERED_BY_READY=false
          if [[ "$COMMENT_TRIGGER" == *"准备完毕"* ]]; then
            TRIGGERED_BY_READY=true
            echo "🔄 由'准备完毕'关键词触发URL重新验证"
          fi
          
          ALL_URI_REACHABLE="true"
          UNREACHABLE_URIS=""
          UNREACHABLE_AVATAR_URIS=""
          
          # 验证每个文件中的URL
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            
            # 验证主URL (uri)
            URI=$(python3 .github/scripts/extract_field.py "$file" uri 2>/dev/null || echo "")
            if [[ -n "$URI" ]]; then
              echo "🔍 检查主URL: ${URI}"
              if ! python3 .github/scripts/check_url.py "$URI"; then
                ALL_URI_REACHABLE="false"
                UNREACHABLE_URIS+="- \`${URI}\` (来自 \`${file}\`)\n"
              fi
            fi
            
            # 验证头像URL (avatar_uri)
            AVATAR_URI=$(python3 .github/scripts/extract_field.py "$file" avatar_uri 2>/dev/null || echo "")
            if [[ -n "$AVATAR_URI" ]]; then
              echo "🔍 检查头像URL: ${AVATAR_URI}"
              if ! python3 .github/scripts/check_url.py "$AVATAR_URI"; then
                UNREACHABLE_AVATAR_URIS+="- \`${AVATAR_URI}\` (来自 \`${file}\`)\n"
              fi
            fi
          done <<< "$CHANGED_FILES"
          
          echo "all_uri_reachable=${ALL_URI_REACHABLE}" >> "$GITHUB_OUTPUT"
          
          # 清理旧的URL相关标签
          remove_label "URL全部可达"
          remove_label "部分URL不可达"
          remove_label "URL全部不可达"
          
          # 处理验证结果
          if [[ "$ALL_URI_REACHABLE" == "true" ]]; then
            add_label "URL全部可达"
            echo "✓ 所有URL均可访问"
          else
            add_label "部分URL不可达"
            
            # 只有在首次失败或由"准备完毕"触发时才发送评论
            if [[ "$TRIGGERED_BY_READY" == "true" ]] || [[ "$COMMENT_TRIGGER" != *"准备完毕"* ]]; then
              COMMENT=$(printf '## ⚠️ URL可达性验证失败\n\n以下 URL 不可达：\n\n%b\n请检查并修改相关URL，确保它们可以正常访问。\n\n修改完成后，请在 PR 评论区回复 `准备完毕` 以重新触发验证。' "$UNREACHABLE_URIS")
              post_comment "$COMMENT"
            fi
            echo "! 部分URL不可达"
          fi
          
          # 处理头像URL警告（不影响合并）
          if [[ -n "$UNREACHABLE_AVATAR_URIS" ]]; then
            AVATAR_COMMENT=$(printf '## 📝 头像 URL 警告\n\n以下头像 URL 目前无法访问，建议检查：\n\n%b\n友链申请仍会继续处理，但建议确保头像 URL 可正常访问。' "$UNREACHABLE_AVATAR_URIS")
            post_comment "$AVATAR_COMMENT"
            echo "! 部分头像URL不可达（警告）"
          fi

      # ---------------------------------------------------------------
      # 阶段5：网站所有权验证
      # ---------------------------------------------------------------
      - name: 验证网站所有权
        id: ownership-check
        if: >
          steps.file-change-check.outputs.valid_change == 'true' &&
          steps.structure-validation.outputs.valid_structure == 'true' &&
          steps.url-validation.outputs.all_uri_reachable == 'true'
        timeout-minutes: 5
        env:
          PAT: ${{ secrets.PAT }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBER="${{ steps.pr-info.outputs.pr_number }}"
          CHANGED_FILES="${{ steps.file-change-check.outputs.changed_files }}"
          COMMENT_BODY="${{ github.event.comment.body }}"
          
          # 辅助函数
          add_label() {
            curl -sf -X POST \
              -H "Authorization: Bearer $PAT" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/labels" \
              -d "$(jq -n --arg l "$1" '{"labels":[$l]}')" > /dev/null || true
          }
          
          remove_label() {
            local encoded
            encoded=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1],safe=''))" "$1")
            curl -sf -X DELETE \
              -H "Authorization: Bearer $PAT" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/labels/$encoded" > /dev/null || true
          }
          
          post_comment() {
            local body_json
            body_json=$(jq -n --arg b "$1" '{"body":$b}')
            curl -sf -X POST \
              -H "Authorization: Bearer $PAT" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
              -d "$body_json" > /dev/null || true
          }
          
          # 检查是否已经通过所有权验证
          CURRENT_LABELS=$(curl -sf \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/labels" \
            | jq -r '[.[].name] | join(",")' 2>/dev/null || echo "")
          
          if [[ "$CURRENT_LABELS" == *"所有权已验证"* ]]; then
            echo "✓ 所有权已验证，跳过此阶段"
            echo "verification_passed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          # 判断触发方式
          if [[ "$COMMENT_BODY" == *"准备完毕"* ]]; then
            echo "🔄 由'准备完毕'关键词触发所有权验证..."
            VERIFICATION_PASSED="false"
            
            # 执行所有权验证
            while IFS= read -r file; do
              [[ -z "$file" ]] && continue
              URI=$(python3 .github/scripts/extract_field.py "$file" uri 2>/dev/null || echo "")
              if [[ -n "$URI" ]]; then
                echo "🔍 验证所有权: ${URI}"
                RESULT=$(python3 .github/scripts/check_ownership.py "$URI" 2>&1)
                EXIT_CODE=$?
                echo "$RESULT"
                if [[ $EXIT_CODE -eq 0 ]]; then
                  VERIFICATION_PASSED="true"
                  break
                fi
              fi
            done <<< "$CHANGED_FILES"
            
            echo "verification_passed=${VERIFICATION_PASSED}" >> "$GITHUB_OUTPUT"
            
            if [[ "$VERIFICATION_PASSED" == "true" ]]; then
              remove_label "验证网站所有权"
              add_label "所有权已验证"
              echo "✓ 网站所有权验证通过"
            else
              post_comment "## ❌ 网站所有权验证失败\n\n未能在您的网站 HTML 源码中检测到指向以下任一 URL 的链接：\n- \`https://waterspo.top\`\n- \`https://www.waterspo.top\`\n\n请确保链接包含在网站页面的 HTML 中，然后在 PR 评论区回复 \`准备完毕\` 以重新触发验证。"
              echo "! 所有权验证失败"
            fi
          else
            echo "ℹ️ 首次执行 - 发送所有权验证说明..."
            echo "verification_passed=false" >> "$GITHUB_OUTPUT"
            add_label "验证网站所有权"
            post_comment "## 🔗 网站所有权验证\n\n为了确认您是该网站的所有者，请在您的网站页面中添加指向以下任一 URL 的链接：\n\n- \`https://waterspo.top\`\n- \`https://www.waterspo.top\`\n\n完成操作后，请在 PR 评论区回复 \`准备完毕\` 以触发所有权验证。"
          fi

      # ---------------------------------------------------------------
      # 阶段6：自动合并
      # ---------------------------------------------------------------
      - name: 条件检查与自动合并
        if: >
          steps.file-change-check.outputs.valid_change == 'true' &&
          steps.structure-validation.outputs.valid_structure == 'true' &&
          steps.url-validation.outputs.all_uri_reachable == 'true' &&
          steps.ownership-check.outputs.verification_passed == 'true'
        timeout-minutes: 3
        env:
          PAT: ${{ secrets.PAT }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBER="${{ steps.pr-info.outputs.pr_number }}"
          SITE_NAME="${{ steps.update-title.outputs.site_name }}"
          
          post_comment() {
            local body_json
            body_json=$(jq -n --arg b "$1" '{"body":$b}')
            curl -sf -X POST \
              -H "Authorization: Bearer $PAT" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
              -d "$body_json" > /dev/null || true
          }
          
          # 获取当前所有标签
          LABELS=$(curl -sf \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/labels" \
            | jq -r '[.[].name] | join(",")')
          
          echo "当前标签: ${LABELS}"
          
          # 检查必需的标签
          HAS_FRIEND_LINK=$([[ "$LABELS" == *"友链申请中"* ]] && echo "true" || echo "false")
          HAS_STRUCTURE=$([[ "$LABELS" == *"文件结构符合"* ]] && echo "true" || echo "false")
          HAS_URL=$([[ "$LABELS" == *"URL全部可达"* ]] && echo "true" || echo "false")
          HAS_OWNERSHIP=$([[ "$LABELS" == *"所有权已验证"* ]] && echo "true" || echo "false")
          
          ALL_MET="true"
          MISSING_COMMENT=""
          
          # 构建缺失条件的提示信息
          if [[ "$HAS_FRIEND_LINK" != "true" ]]; then
            ALL_MET="false"; MISSING_COMMENT+=$'\n- 友链申请中'
          fi
          if [[ "$HAS_STRUCTURE" != "true" ]]; then
            ALL_MET="false"; MISSING_COMMENT+=$'\n- 文件结构符合'
          fi
          if [[ "$HAS_URL" != "true" ]]; then
            ALL_MET="false"; MISSING_COMMENT+=$'\n- URL全部可达'
          fi
          if [[ "$HAS_OWNERSHIP" != "true" ]]; then
            ALL_MET="false"; MISSING_COMMENT+=$'\n- 所有权已验证'
          fi
          
          # 执行合并或提示缺失条件
          if [[ "$ALL_MET" == "true" ]]; then
            echo "✓ 所有条件满足 - 执行自动合并"
            
            MERGE_JSON=$(jq -n --arg title "Merge友链申请: ${SITE_NAME}" \
              '{"merge_method":"squash","commit_title":$title}')
            
            RESPONSE=$(curl -sf -X PUT \
              -H "Authorization: Bearer $PAT" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/merge" \
              -d "$MERGE_JSON")
            
            if [[ $? -eq 0 ]]; then
              echo "✓ PR合并成功"
              post_comment "## 🎉 友链申请合并成功！\n\n恭喜！您的友链申请已成功合并，稍后将在网站上显示。感谢您的贡献！"
            else
              echo "::error::PR合并失败"
              post_comment "## ⚠️ 合并失败\n\n自动合并过程中出现问题，请联系仓库维护者手动处理。"
            fi
          else
            echo "! 条件不满足 - 发送状态提醒"
            COMMENT=$(printf '## ⏳ 自动合并条件未满足\n\n当前缺少以下验证标签：%s\n\n请完成所有验证步骤后再尝试合并。' "$MISSING_COMMENT")
            post_comment "$COMMENT"
          fi