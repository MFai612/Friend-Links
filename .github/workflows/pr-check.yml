name: PR Friend Link Check

on:
  pull_request:
    types: [opened, synchronize, edited, reopened]
  issue_comment:
    types: [created]

jobs:
  pr_check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run PR checker
        env:
          # Use repository PAT to allow gh and GraphQL operations
          GH_TOKEN: ${{ secrets.PAT }}
          PAT: ${{ secrets.PAT }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python .github/scripts/pr_checker.py
